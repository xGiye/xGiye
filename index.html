<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xGiye | Home</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.svg" />
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <a href="./index.html"
          ><img class="logo-img" src="./assets/favicon.svg" alt="xGiye Logo"
        /></a>
        <nav class="nav">
          <a class="nav-link" href="./index.html">Home</a>
          <a class="nav-link" href="./pages/about.html">About</a>
          <a class="nav-link" href="./pages/404.html">Project</a>
          <a class="nav-link" href="./pages/404.html">Contact</a>
        </nav>
      </header>
      <section class="cc">
        <div class="content">
          <h1
            data-testid="slackUserName"
            id="slackUserName"
            class="slackUserName">
            xGiye
          </h1>
          <p>
            A thriving
            <span data-testid="myTrack" class="span" id="myTrack"
              >Frontend</span
            >
            developer with sprinkles of UI/UX design and Backend development.
          </p>
          <p>Taking steps, one at a time</p>

          <a
            href="https://github.com/xGiye/xGiye"
            class="nav-link"
            id="githubURL"
            data-testid="githubURL"
            >Github Code</a
          >
        </div>
        <div class="s">
          <img
            class="bc"
            data-testid="slackDisplayImage"
            src="https://i.ibb.co/pdfrh4W/21.png"
            alt="xGiye" />
        </div>
      </section>
      <div class="time">
        <p>
          Day of the week:
          <span
            data-testid="currentDayOfTheWeek"
            id="currentDayOfTheWeek"
            class="span"
            >--</span
          >
        </p>
        <p>
          UTC Time in Milliseconds:
          <span data-testid="currentUTCTime" id="currentUTCTime" class="span"
            >--</span
          >
        </p>
      </div>
    </main>
    <script src="./js/main.js"></script>
  </body>
</html>
